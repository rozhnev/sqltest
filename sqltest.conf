<VirtualHost *:80>
	# The ServerName directive sets the request scheme, hostname and port that
	# the server uses to identify itself. This is used when creating
	# redirection URLs. In the context of virtual hosts, the ServerName
	# specifies what hostname must appear in the request's Host: header to
	# match this virtual host. For the default virtual host (this file) this
	# value is not decisive as it is used as a last resort host regardless.
	# However, you must set it for any further virtual host explicitly.
	#ServerName www.example.com

	ServerAdmin webmaster@localhost
	DocumentRoot /var/www/sqltest
    DirectoryIndex index.php
	# Available loglevels: trace8, ..., trace1, debug, info, notice, warn,
	# error, crit, alert, emerg.
	# It is also possible to configure the loglevel for particular
	# modules, e.g.
	#LogLevel info ssl:warn

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined

	# For most configuration files from conf-available/, which are
	# enabled or disabled at a global level, it is possible to
	# include a line for only one particular virtual host. For example the
	# following line enables the CGI configuration for this host only
	# after it has been globally disabled with "a2disconf".
	#Include conf-available/serve-cgi-bin.conf


	ServerName sqltest.local

	RewriteEngine on

    # Specifically for Apache 2.4+ (Standard on most modern servers)
    <IfModule mod_authz_core.c>
        <FilesMatch "^(\.env|\.git|\.htaccess|composer\.(json|lock)|auth\.json)$">
            Require all denied
        </FilesMatch>
    </IfModule>

	# Route admin SPA/API through admin/index.php before every thing else.
	RewriteCond %{REQUEST_URI} ^/admin(/.*)?$
	RewriteCond %{REQUEST_URI} !^/admin/index\.php(/.*)?$
	RewriteCond %{REQUEST_FILENAME} !-f
	RewriteRule ^/admin(?:/(.*))?$ /admin/index.php/$1 [L,QSA]

	RewriteCond %{REQUEST_URI} !^/admin(/.*)?$
	RewriteCond %{REQUEST_FILENAME} !-d
	RewriteCond %{REQUEST_FILENAME} !-f
	RewriteCond %{REQUEST_URI}  !\.(css|js|png|jpg|gif|jpeg|bmp|svg)$
	# <LocationMatch "/login/vk">
	# 	UnsafeAllow3F On
	# </LocationMatch>
	RewriteRule ^(.*)$ /index.php?path=$1 [L,QSA]

	<IfModule mod_expires.c>
		ExpiresActive On
		ExpiresByType application/javascript "access plus 1 year"
		ExpiresByType text/javascript "access plus 1 year"
		ExpiresByType text/css "access plus 1 year"
		ExpiresByType image/png "access plus 1 year"
		ExpiresByType image/jpeg "access plus 1 year"
		ExpiresByType image/gif "access plus 1 year"
		ExpiresByType image/bmp "access plus 1 year"
		ExpiresByType image/svg+xml "access plus 1 year"
	</IfModule>

	<IfModule mod_headers.c>
		<FilesMatch "\.(css|js|png|jpg|gif|jpeg|bmp|svg)$">
			Header set Cache-Control "public, max-age=31536000, immutable"
		</FilesMatch>
	</IfModule>

	<Directory /var/www/sqltest/>
		AllowOverride All
	</Directory>
</VirtualHost>


<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/sqltest
    DirectoryIndex index.php
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    ServerName sqltest.local

    <Directory /var/www/sqltest/>
        AllowOverride All
    </Directory>

    RewriteEngine On

    # Specifically for Apache 2.4+ (Standard on most modern servers)
    <IfModule mod_authz_core.c>
        <FilesMatch "^(\.env|\.git|\.htaccess|composer\.(json|lock)|auth\.json)$">
            Require all denied
        </FilesMatch>
    </IfModule>

    # Admin routes - handle all /admin/* requests with /admin/index.php
    RewriteCond %{REQUEST_URI} ^/admin
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
	RewriteCond %{REQUEST_URI} !\.(css|js|png|jpg|gif|jpeg|bmp|svg)$
    RewriteRule ^admin(/.*)?$ /admin/index.php [L,QSA]

    # Public routes - everything else goes to index.php
	RewriteCond %{REQUEST_URI} !^/admin
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !\.(css|js|png|jpg|gif|jpeg|bmp|svg)$
    RewriteRule ^(.*)$ /index.php?path=$1 [L,QSA]

	<IfModule mod_expires.c>
		ExpiresActive On
		ExpiresByType application/javascript "access plus 1 year"
		ExpiresByType text/javascript "access plus 1 year"
		ExpiresByType text/css "access plus 1 year"
		ExpiresByType image/png "access plus 1 year"
		ExpiresByType image/jpeg "access plus 1 year"
		ExpiresByType image/gif "access plus 1 year"
		ExpiresByType image/bmp "access plus 1 year"
		ExpiresByType image/svg+xml "access plus 1 year"
	</IfModule>

	<IfModule mod_headers.c>
		<FilesMatch "\.(css|js|png|jpg|gif|jpeg|bmp|svg)$">
			Header set Cache-Control "public, max-age=31536000, immutable"
		</FilesMatch>
	</IfModule>
</VirtualHost>