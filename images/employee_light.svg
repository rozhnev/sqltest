<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Employee Database ERD</title>
  <desc id="desc">Entity relationship diagram for Employee DB, laid out to minimize connector crossings with equal-width table blocks.</desc>

  <defs>
    <style>
      .bg { fill: #f3f6fb; }
      .grid { stroke: #e5eaf2; stroke-width: 1; }
      .panel { fill: #ffffff; stroke: #25364a; stroke-width: 1.5; }
      .header { fill: #0f4aa3; }
      .title { fill: #ffffff; font: 700 15px 'Segoe UI', Arial, sans-serif; }
      .col { fill: #1f2d3d; font: 12px 'Segoe UI', Arial, sans-serif; }
      .pk { fill: #0f766e; font: 700 11px 'Segoe UI', Arial, sans-serif; }
      .fk { fill: #7e22ce; font: 700 11px 'Segoe UI', Arial, sans-serif; }
      .edge { stroke: #334155; stroke-width: 2; fill: none; }
      .edge-soft { stroke: #64748b; stroke-width: 1.6; fill: none; stroke-dasharray: 5 4; }
      .label { fill: #0f172a; font: 11px 'Segoe UI', Arial, sans-serif; }
      .main { fill: #0b1220; font: 700 26px 'Segoe UI', Arial, sans-serif; }
      .sub { fill: #334155; font: 13px 'Segoe UI', Arial, sans-serif; }
      .legend-box { fill: #ffffff; stroke: #334155; stroke-width: 1.2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#9aa8bd" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="900"/>

  <!-- soft alignment grid -->
  <g opacity="0.55">
    <line class="grid" x1="80" y1="70" x2="80" y2="900"/>
    <line class="grid" x1="420" y1="70" x2="420" y2="900"/>
    <line class="grid" x1="760" y1="70" x2="760" y2="900"/>
    <line class="grid" x1="1100" y1="70" x2="1100" y2="900"/>
    <line class="grid" x1="1440" y1="70" x2="1440" y2="900"/>
    <line class="grid" x1="80" y1="120" x2="1500" y2="120"/>
    <line class="grid" x1="80" y1="360" x2="1500" y2="360"/>
    <line class="grid" x1="80" y1="620" x2="1500" y2="620"/>
  </g>

  <!-- Equal width for all tables: 300 -->

  <!-- COUNTRY -->
  <g transform="translate(80,120)" filter="url(#shadow)">
    <rect class="panel" width="300" height="108" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">COUNTRY</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">COUNTRY</text>
    <text class="col" x="44" y="75">CURRENCY</text>
  </g>

  <!-- JOB -->
  <g transform="translate(420,120)" filter="url(#shadow)">
    <rect class="panel" width="300" height="152" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">JOB</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">JOB_CODE</text>
    <text class="col" x="44" y="75">JOB_GRADE</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">JOB_COUNTRY -> COUNTRY</text>
    <text class="col" x="44" y="119">JOB_TITLE</text>
    <text class="col" x="44" y="141">MIN_SALARY, MAX_SALARY...</text>
  </g>

  <!-- DEPARTMENT -->
  <g transform="translate(760,120)" filter="url(#shadow)">
    <rect class="panel" width="300" height="152" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">DEPARTMENT</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">DEPT_NO</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">HEAD_DEPT -> DEPARTMENT</text>
    <text class="col" x="44" y="97">DEPARTMENT, BUDGET</text>
    <text class="col" x="44" y="119">LOCATION, PHONE_NO</text>
    <text class="col" x="44" y="141">MNGR_NO (no FK in template)</text>
  </g>

  <!-- CUSTOMER -->
  <g transform="translate(80,360)" filter="url(#shadow)">
    <rect class="panel" width="300" height="174" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">CUSTOMER</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">CUST_NO</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">COUNTRY -> COUNTRY</text>
    <text class="col" x="44" y="97">CUSTOMER, CONTACT_FIRST/LAST</text>
    <text class="col" x="44" y="119">PHONE_NO, ADDRESS_LINE1/2</text>
    <text class="col" x="44" y="141">CITY, STATE_PROVINCE, POSTAL_CODE</text>
    <text class="col" x="44" y="163">ON_HOLD</text>
  </g>

  <!-- EMPLOYEE -->
  <g transform="translate(420,360)" filter="url(#shadow)">
    <rect class="panel" width="300" height="196" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">EMPLOYEE</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">EMP_NO</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">DEPT_NO -> DEPARTMENT</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">JOB_CODE -> JOB</text>
    <text class="col" x="44" y="119">FIRST_NAME, LAST_NAME</text>
    <text class="col" x="44" y="141">PHONE_EXT, HIRE_DATE</text>
    <text class="col" x="44" y="163">JOB_GRADE, JOB_COUNTRY</text>
    <text class="col" x="44" y="185">SALARY, FULL_NAME</text>
  </g>

  <!-- PROJECT -->
  <g transform="translate(760,360)" filter="url(#shadow)">
    <rect class="panel" width="300" height="130" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">PROJECT</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">PROJ_ID</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">TEAM_LEADER -> EMPLOYEE</text>
    <text class="col" x="44" y="97">PROJ_NAME, PROJ_DESC, PRODUCT</text>
  </g>

  <!-- SALES -->
  <g transform="translate(80,620)" filter="url(#shadow)">
    <rect class="panel" width="300" height="152" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">SALES</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">PO_NUMBER</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">CUST_NO -> CUSTOMER</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">SALES_REP -> EMPLOYEE</text>
    <text class="col" x="44" y="119">ORDER_DATE, SHIP_DATE, STATUS</text>
    <text class="col" x="44" y="141">QTY_ORDERED, TOTAL_VALUE...</text>
  </g>

  <!-- SALARY_HISTORY -->
  <g transform="translate(420,620)" filter="url(#shadow)">
    <rect class="panel" width="300" height="124" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">SALARY_HISTORY</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">EMP_NO, CHANGE_DATE</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">EMP_NO -> EMPLOYEE</text>
    <text class="col" x="44" y="97">OLD_SALARY, NEW_SALARY...</text>
  </g>

  <!-- EMPLOYEE_PROJECT -->
  <g transform="translate(760,620)" filter="url(#shadow)">
    <rect class="panel" width="300" height="124" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">EMPLOYEE_PROJECT</text>
    <text class="pk" x="14" y="53">PK</text><text class="fk" x="44" y="53">FK</text><text class="col" x="78" y="53">EMP_NO -> EMPLOYEE</text>
    <text class="pk" x="14" y="75">PK</text><text class="fk" x="44" y="75">FK</text><text class="col" x="78" y="75">PROJ_ID -> PROJECT</text>
  </g>

  <!-- PROJ_DEPT_BUDGET -->
  <g transform="translate(1100,620)" filter="url(#shadow)">
    <rect class="panel" width="300" height="124" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">PROJ_DEPT_BUDGET</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">FISCAL_YEAR, PROJ_ID, DEPT_NO</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">PROJ_ID -> PROJECT</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">DEPT_NO -> DEPARTMENT</text>
  </g>

  <!-- Edges routed in separate lanes to reduce crossings -->

  <!-- JOB -> COUNTRY -->
  <path class="edge" d="M 420 210 L 390 210 L 390 174" marker-end="url(#arrow)"/>
  <text class="label" x="394" y="200">N:1</text>

  <!-- CUSTOMER -> COUNTRY -->
  <path class="edge" d="M 230 360 L 230 228" marker-end="url(#arrow)"/>
  <text class="label" x="238" y="292">N:1</text>

  <!-- EMPLOYEE -> JOB (vertical lane) -->
  <path class="edge" d="M 560 360 L 560 272" marker-end="url(#arrow)"/>
  <text class="label" x="568" y="318">N:1</text>

  <!-- EMPLOYEE -> DEPARTMENT (upper channel, no crossing) -->
  <path class="edge" d="M 640 360 L 640 292 L 910 292 L 910 272" marker-end="url(#arrow)"/>
  <text class="label" x="770" y="284">N:1</text>

  <!-- DEPARTMENT self-loop (HEAD_DEPT) -->
  <path class="edge-soft" d="M 1030 182 L 1085 182 L 1085 108 L 905 108 L 905 120" marker-end="url(#arrow)"/>
  <text class="label" x="980" y="101">N:1</text>

  <!-- PROJECT -> EMPLOYEE -->
  <path class="edge" d="M 760 425 L 720 425" marker-end="url(#arrow)"/>
  <text class="label" x="730" y="415">N:1</text>

  <!-- SALES -> CUSTOMER -->
  <path class="edge" d="M 230 620 L 230 534" marker-end="url(#arrow)"/>
  <text class="label" x="238" y="580">N:1</text>

  <!-- SALES -> EMPLOYEE (left side lane) -->
  <path class="edge" d="M 380 700 L 400 700 L 400 458 L 420 458" marker-end="url(#arrow)"/>
  <text class="label" x="408" y="586">N:1</text>

  <!-- SALARY_HISTORY -> EMPLOYEE -->
  <path class="edge" d="M 560 620 L 560 556" marker-end="url(#arrow)"/>
  <text class="label" x="568" y="590">N:1</text>

  <!-- EMPLOYEE_PROJECT -> EMPLOYEE -->
  <path class="edge" d="M 880 620 L 880 576 L 690 576 L 690 556" marker-end="url(#arrow)"/>
  <text class="label" x="785" y="568">N:1</text>

  <!-- EMPLOYEE_PROJECT -> PROJECT -->
  <path class="edge" d="M 940 620 L 940 490" marker-end="url(#arrow)"/>
  <text class="label" x="948" y="560">N:1</text>

  <!-- PROJ_DEPT_BUDGET -> PROJECT -->
  <path class="edge" d="M 1240 620 L 1240 510 L 1060 510" marker-end="url(#arrow)"/>
  <text class="label" x="1150" y="500">N:1</text>

  <!-- PROJ_DEPT_BUDGET -> DEPARTMENT (right lane up) -->
  <path class="edge" d="M 1330 620 L 1330 300 L 1060 300" marker-end="url(#arrow)"/>
  <text class="label" x="1196" y="290">N:1</text>

  <!-- Legend -->
  <g transform="translate(1100,120)">
    <rect class="legend-box" x="0" y="0" width="300" height="132" rx="8" ry="8"/>
    <text x="14" y="24" style="font:700 14px 'Segoe UI', Arial, sans-serif; fill:#0f172a;">Legend</text>
    <text class="pk" x="14" y="50">PK</text><text class="col" x="44" y="50">Primary key</text>
    <text class="fk" x="14" y="72">FK</text><text class="col" x="44" y="72">Foreign key</text>
    <line class="edge" x1="14" y1="92" x2="84" y2="92" marker-end="url(#arrow)"/>
    <text class="col" x="94" y="96">Child table points to parent table</text>
    <text class="col" x="14" y="118">All table blocks are equal width (300 px)</text>
  </g>
</svg>
