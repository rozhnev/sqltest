<?xml-stylesheet type="text/css" href="/css/erd.css"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1320" viewBox="0 0 1920 1320" role="img" aria-labelledby="title desc" class="erd erd-sakila">
  <title id="title">Sakila Database ERD</title>
  <desc id="desc">Entity relationship diagram for Sakila with 15 core tables and explicit foreign key connectors.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--erd-edge)"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="var(--erd-shadow-color)" flood-opacity="var(--erd-shadow-opacity)"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1320"/>

  <g opacity="0.55">
    <line class="grid" x1="60" y1="60" x2="60" y2="1320"/>
    <line class="grid" x1="420" y1="60" x2="420" y2="1320"/>
    <line class="grid" x1="780" y1="60" x2="780" y2="1320"/>
    <line class="grid" x1="1140" y1="60" x2="1140" y2="1320"/>
    <line class="grid" x1="1500" y1="60" x2="1500" y2="1320"/>
    <line class="grid" x1="1860" y1="60" x2="1860" y2="1320"/>
    <line class="grid" x1="60" y1="80" x2="1920" y2="80"/>
    <line class="grid" x1="60" y1="400" x2="1920" y2="400"/>
    <line class="grid" x1="60" y1="770" x2="1920" y2="770"/>
    <line class="grid" x1="60" y1="1050" x2="1920" y2="1050"/>
  </g>

  <!-- Row 1 -->
  <g transform="translate(60,80)" filter="url(#shadow)">
    <rect class="panel" width="300" height="108" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">country</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">country_id</text>
    <text class="col" x="44" y="75">country</text>
    <text class="col" x="44" y="97">last_update</text>
  </g>

  <g transform="translate(420,80)" filter="url(#shadow)">
    <rect class="panel" width="300" height="130" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">city</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">city_id</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">country_id -&gt; country</text>
    <text class="col" x="44" y="97">city</text>
    <text class="col" x="44" y="119">last_update</text>
  </g>

  <g transform="translate(780,80)" filter="url(#shadow)">
    <rect class="panel" width="300" height="196" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">address</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">address_id</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">city_id -&gt; city</text>
    <text class="col" x="44" y="97">address</text>
    <text class="col" x="44" y="119">district</text>
    <text class="col" x="44" y="141">phone</text>
    <text class="col" x="44" y="163">postal_code</text>
    <text class="col" x="44" y="185">last_update</text>
  </g>

  <g transform="translate(1140,80)" filter="url(#shadow)">
    <rect class="panel" width="300" height="152" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">store</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">store_id</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">manager_staff_id -&gt; staff</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">address_id -&gt; address</text>
    <text class="col" x="44" y="119">last_update</text>
  </g>

  <g transform="translate(1500,80)" filter="url(#shadow)">
    <rect class="panel" width="300" height="284" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">staff</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">staff_id</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">address_id -&gt; address</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">store_id -&gt; store</text>
    <text class="col" x="44" y="119">first_name</text>
    <text class="col" x="44" y="141">last_name</text>
    <text class="col" x="44" y="163">email</text>
    <text class="col" x="44" y="185">username</text>
    <text class="col" x="44" y="207">active</text>
    <text class="col" x="44" y="229">password</text>
    <text class="col" x="44" y="251">picture</text>
    <text class="col" x="44" y="273">last_update</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(60,520)" filter="url(#shadow)">
    <rect class="panel" width="300" height="108" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">language</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">language_id</text>
    <text class="col" x="44" y="75">name</text>
    <text class="col" x="44" y="97">last_update</text>
  </g>

  <g transform="translate(420,620)" filter="url(#shadow)">
    <rect class="panel" width="300" height="108" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">category</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">category_id</text>
    <text class="col" x="44" y="75">name</text>
    <text class="col" x="44" y="97">last_update</text>
  </g>

  <g transform="translate(780,400)" filter="url(#shadow)">
    <rect class="panel" width="300" height="108" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">film_actor</text>
    <text class="pk" x="14" y="53">PK</text><text class="fk" x="44" y="53">FK</text><text class="col" x="78" y="53">actor_id</text>
    <text class="pk" x="14" y="75">PK</text><text class="fk" x="44" y="75">FK</text><text class="col" x="78" y="75">film_id</text>
    <text class="col" x="44" y="97">last_update</text>
  </g>

  <g transform="translate(1140,400)" filter="url(#shadow)">
    <rect class="panel" width="300" height="328" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">film</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">film_id</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">language_id -&gt; language</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">original_language_id -&gt; lang</text>
    <text class="col" x="44" y="119">title</text>
    <text class="col" x="44" y="141">description</text>
    <text class="col" x="44" y="163">release_year</text>
    <text class="col" x="44" y="185">rental_duration</text>
    <text class="col" x="44" y="207">rental_rate</text>
    <text class="col" x="44" y="229">length</text>
    <text class="col" x="44" y="251">rating</text>
    <text class="col" x="44" y="273">special_features</text>
    <text class="col" x="44" y="295">replacement_cost</text>
    <text class="col" x="44" y="317">last_update</text>
  </g>

  <g transform="translate(1500,430)" filter="url(#shadow)">
    <rect class="panel" width="300" height="152" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">inventory</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">inventory_id</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">film_id -&gt; film</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">store_id -&gt; store</text>
    <text class="col" x="44" y="119">last_update</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(780,620)" filter="url(#shadow)">
    <rect class="panel" width="300" height="108" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">film_category</text>
    <text class="pk" x="14" y="53">PK</text><text class="fk" x="44" y="53">FK</text><text class="col" x="78" y="53">film_id</text>
    <text class="pk" x="14" y="75">PK</text><text class="fk" x="44" y="75">FK</text><text class="col" x="78" y="75">category_id</text>
    <text class="col" x="44" y="97">last_update</text>
  </g>

  <g transform="translate(420,400)" filter="url(#shadow)">
    <rect class="panel" width="300" height="130" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">actor</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">actor_id</text>
    <text class="col" x="44" y="75">first_name</text>
    <text class="col" x="44" y="97">last_name</text>
    <text class="col" x="44" y="119">last_update</text>
  </g>

  <g transform="translate(1140,770)" filter="url(#shadow)">
    <rect class="panel" width="300" height="240" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">customer</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">customer_id</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">store_id -&gt; store</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">address_id -&gt; address</text>
    <text class="col" x="44" y="119">first_name</text>
    <text class="col" x="44" y="141">last_name</text>
    <text class="col" x="44" y="163">email</text>
    <text class="col" x="44" y="185">active</text>
    <text class="col" x="44" y="207">create_date</text>
    <text class="col" x="44" y="229">last_update</text>
  </g>

  <g transform="translate(1500,770)" filter="url(#shadow)">
    <rect class="panel" width="300" height="196" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">rental</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">rental_id</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">inventory_id -&gt; inventory</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">customer_id -&gt; customer</text>
    <text class="fk" x="14" y="119">FK</text><text class="col" x="44" y="119">staff_id -&gt; staff</text>
    <text class="col" x="44" y="141">rental_date</text>
    <text class="col" x="44" y="163">return_date</text>
    <text class="col" x="44" y="185">last_update</text>
  </g>

  <!-- Row 4 -->
  <g transform="translate(1500,1050)" filter="url(#shadow)">
    <rect class="panel" width="300" height="196" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">payment</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">payment_id</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">customer_id -&gt; customer</text>
    <text class="fk" x="14" y="97">FK</text><text class="col" x="44" y="97">staff_id -&gt; staff</text>
    <text class="fk" x="14" y="119">FK</text><text class="col" x="44" y="119">rental_id -&gt; rental</text>
    <text class="col" x="44" y="141">amount</text>
    <text class="col" x="44" y="163">payment_date</text>
    <text class="col" x="44" y="185">last_update</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60,1050)">
    <rect class="legend-box" x="0" y="0" width="420" height="152" rx="8" ry="8"/>
    <text class="legend-title" x="14" y="24">Legend</text>
    <text class="pk" x="14" y="50">PK</text><text class="col" x="44" y="50">Primary key</text>
    <text class="fk" x="14" y="72">FK</text><text class="col" x="44" y="72">Foreign key</text>
    <line class="edge" x1="14" y1="94" x2="84" y2="94" marker-end="url(#arrow)"/>
    <text class="col" x="94" y="98">Child table points to parent table</text>
    <text class="col" x="14" y="124">One line per FK relationship</text>
    <text class="col" x="14" y="144">No path through table bodies</text>
  </g>

  <!-- Relationships -->
  <!-- city -> country -->
  <path class="edge" d="M 420 148 L 360 148" marker-end="url(#arrow)"/>

  <!-- address -> city -->
  <path class="edge" d="M 780 178 L 720 178" marker-end="url(#arrow)"/>

  <!-- store -> address -->
  <path class="edge" d="M 1140 133 L 1080 133" marker-end="url(#arrow)"/>

  <!-- store -> staff (manager_staff_id) -->
  <path class="edge" d="M 1440 148 L 1500 148" marker-end="url(#arrow)"/>

  <!-- staff -> address -->
  <path class="edge" d="M 1500 190 L 1460 190 L 1460 60 L 760 60 L 760 145 L 780 145" marker-end="url(#arrow)"/>

  <!-- staff -> store -->
  <path class="edge" d="M 1500 212 L 1440 212" marker-end="url(#arrow)"/>

  <!-- customer -> store -->
  <path class="edge" d="M 1140 890 L 1120 890 L 1120 156 L 1140 156" marker-end="url(#arrow)"/>

  <!-- customer -> address -->
  <path class="edge" d="M 1140 890 L 1100 890 L 1100 178 L 1080 178" marker-end="url(#arrow)"/>

  <!-- film -> language (language_id) -->
  <path class="edge" d="M 1140 560 L 360 560" marker-end="url(#arrow)"/>

  <!-- film -> language (original_language_id) -->
  <path class="edge" d="M 1140 582 L 360 582" marker-end="url(#arrow)"/>

  <!-- inventory -> film -->
  <path class="edge" d="M 1500 500 L 1440 500" marker-end="url(#arrow)"/>

  <!-- inventory -> store -->
  <path class="edge" d="M 1650 430 L 1650 377 L 1290 377 L 1290 232" marker-end="url(#arrow)"/>

  <!-- film_actor -> actor -->
  <path class="edge" d="M 780 454 L 720 454" marker-end="url(#arrow)"/>

  <!-- film_actor -> film -->
  <path class="edge" d="M 1080 454 L 1140 454" marker-end="url(#arrow)"/>

  <!-- film_category -> film -->
  <path class="edge" d="M 1080 674 L 1140 674" marker-end="url(#arrow)"/>

  <!-- film_category -> category -->
  <path class="edge" d="M 780 670 L 720 670" marker-end="url(#arrow)"/>

  <!-- rental -> inventory -->
  <path class="edge" d="M 1650 770 L 1650 582" marker-end="url(#arrow)"/>

  <!-- rental -> customer -->
  <path class="edge" d="M 1500 850 L 1440 850" marker-end="url(#arrow)"/>

  <!-- rental -> staff -->
  <path class="edge" d="M 1800 890 L 1820 890 L 1820 320 L 1800 320" marker-end="url(#arrow)"/>
  <text class="label" x="1826" y="612">N:1</text>

  <!-- payment -> rental -->
  <path class="edge" d="M 1650 1050 L 1650 966" marker-end="url(#arrow)"/>

  <!-- payment -> staff -->
  <path class="edge" d="M 1800 1140 L 1840 1140 L 1840 214 L 1800 214" marker-end="url(#arrow)"/>
  <text class="label" x="1846" y="690">N:1</text>

  <!-- payment -> customer -->
  <path class="edge" d="M 1500 1120 L 1290 1120 L 1290 1010" marker-end="url(#arrow)"/>
</svg>
