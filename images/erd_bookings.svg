<?xml-stylesheet type="text/css" href="/css/erd.css"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc" class="erd erd-bookings">
  <title id="title">Bookings Database ERD</title>
  <desc id="desc">Entity relationship diagram for the Bookings database with 8 main tables and key foreign key relationships.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--erd-edge)"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="var(--erd-shadow-color)" flood-opacity="var(--erd-shadow-opacity)"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="920"/>

  <g opacity="0.55">
    <line class="grid" x1="80" y1="70" x2="80" y2="920"/>
    <line class="grid" x1="420" y1="70" x2="420" y2="920"/>
    <line class="grid" x1="760" y1="70" x2="760" y2="920"/>
    <line class="grid" x1="1100" y1="70" x2="1100" y2="920"/>
    <line class="grid" x1="1440" y1="70" x2="1440" y2="920"/>
    <line class="grid" x1="80" y1="120" x2="1500" y2="120"/>
    <line class="grid" x1="80" y1="500" x2="1500" y2="500"/>
    <line class="grid" x1="80" y1="730" x2="1500" y2="730"/>
  </g>

  <!-- aircrafts_data -->
  <g transform="translate(80,120)" filter="url(#shadow)">
    <rect class="panel" width="300" height="130" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">aircrafts_data</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">aircraft_code</text>
    <text class="col" x="44" y="75">model</text>
    <text class="col" x="44" y="97">range</text>
    <text class="col" x="44" y="119">aircraft catalog</text>
  </g>

  <!-- airports_data -->
  <g transform="translate(760,120)" filter="url(#shadow)">
    <rect class="panel" width="300" height="152" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">airports_data</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">airport_code</text>
    <text class="col" x="44" y="75">airport_name</text>
    <text class="col" x="44" y="97">city</text>
    <text class="col" x="44" y="119">coordinates</text>
    <text class="col" x="44" y="141">timezone</text>
  </g>

  <!-- flights -->
  <g transform="translate(420,120)" filter="url(#shadow)">
    <rect class="panel" width="300" height="262" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">flights</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">flight_id</text>
    <text class="col" x="44" y="75">flight_no</text>
    <text class="col" x="44" y="97">scheduled_departure</text>
    <text class="col" x="44" y="119">scheduled_arrival</text>
    <text class="fk" x="14" y="141">FK</text><text class="col" x="44" y="141">departure_airport -&gt; airports_data</text>
    <text class="fk" x="14" y="163">FK</text><text class="col" x="44" y="163">arrival_airport -&gt; airports_data</text>
    <text class="fk" x="14" y="185">FK</text><text class="col" x="44" y="185">aircraft_code -&gt; aircrafts_data</text>
    <text class="col" x="44" y="207">status</text>
    <text class="col" x="44" y="229">actual_departure</text>
    <text class="col" x="44" y="251">actual_arrival</text>
  </g>

  <!-- bookings -->
  <g transform="translate(1100,120)" filter="url(#shadow)">
    <rect class="panel" width="300" height="108" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">bookings</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">book_ref</text>
    <text class="col" x="44" y="75">book_date</text>
    <text class="col" x="44" y="97">total_amount</text>
  </g>

  <!-- seats -->
  <g transform="translate(80,500)" filter="url(#shadow)">
    <rect class="panel" width="300" height="108" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">seats</text>
    <text class="pk" x="14" y="53">PK</text><text class="fk" x="44" y="53">FK</text><text class="col" x="78" y="53">aircraft_code</text>
    <text class="pk" x="14" y="75">PK</text><text class="col" x="78" y="75">seat_no</text>
    <text class="col" x="44" y="97">fare_conditions</text>
  </g>

  <!-- ticket_flights -->
  <g transform="translate(760,500)" filter="url(#shadow)">
    <rect class="panel" width="300" height="152" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">ticket_flights</text>
    <text class="pk" x="14" y="53">PK</text><text class="fk" x="44" y="53">FK</text><text class="col" x="78" y="53">ticket_no -&gt; tickets</text>
    <text class="pk" x="14" y="75">PK</text><text class="fk" x="44" y="75">FK</text><text class="col" x="78" y="75">flight_id -&gt; flights</text>
    <text class="col" x="44" y="97">fare_conditions</text>
    <text class="col" x="44" y="119">amount</text>
    <text class="col" x="44" y="141">ticket to flight map</text>
  </g>

  <!-- boarding_passes -->
  <g transform="translate(420,500)" filter="url(#shadow)">
    <rect class="panel" width="300" height="152" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">boarding_passes</text>
    <text class="pk" x="14" y="53">PK</text><text class="fk" x="44" y="53">FK</text><text class="col" x="78" y="53">ticket_no</text>
    <text class="pk" x="14" y="75">PK</text><text class="fk" x="44" y="75">FK</text><text class="col" x="78" y="75">flight_id</text>
    <text class="col" x="44" y="97">boarding_no</text>
    <text class="col" x="44" y="119">seat_no</text>
    <text class="col" x="44" y="141">check-in data</text>
  </g>

  <!-- tickets -->
  <g transform="translate(1100,500)" filter="url(#shadow)">
    <rect class="panel" width="300" height="152" rx="10" ry="10"/>
    <rect class="header" width="300" height="32" rx="10" ry="10"/>
    <text class="title" x="14" y="21">tickets</text>
    <text class="pk" x="14" y="53">PK</text><text class="col" x="44" y="53">ticket_no</text>
    <text class="fk" x="14" y="75">FK</text><text class="col" x="44" y="75">book_ref -&gt; bookings</text>
    <text class="col" x="44" y="97">passenger_id</text>
    <text class="col" x="44" y="119">passenger_name</text>
    <text class="col" x="44" y="141">contact_data</text>
  </g>

  <!-- Legend -->
  <g transform="translate(1100,730)">
    <rect class="legend-box" x="0" y="0" width="380" height="170" rx="8" ry="8"/>
    <text class="legend-title" x="14" y="24">Legend</text>
    <text class="pk" x="14" y="50">PK</text><text class="col" x="44" y="50">Primary key</text>
    <text class="fk" x="14" y="72">FK</text><text class="col" x="44" y="72">Foreign key</text>
    <line class="edge" x1="14" y1="94" x2="84" y2="94" marker-end="url(#arrow)"/>
    <text class="col" x="94" y="98">Child table points to parent table</text>
    <text class="col" x="14" y="124">One connector line per FK</text>
    <text class="col" x="14" y="146">No connector through table bodies</text>
  </g>

  <!-- Relationships -->

  <!-- seats -> aircrafts_data -->
  <path class="edge" d="M 230 500 L 230 250" marker-end="url(#arrow)"/>
  <text class="label" x="238" y="338">N:1</text>

  <!-- flights -> aircrafts_data (aircraft_code) -->
  <path class="edge" d="M 420 186 L 380 186" marker-end="url(#arrow)"/>
  <text class="label" x="388" y="176">N:1</text>

  <!-- flights -> airports_data (departure_airport) -->
  <path class="edge" d="M 720 176 L 760 176" marker-end="url(#arrow)"/>
  <text class="label" x="726" y="166">N:1</text>

  <!-- flights -> airports_data (arrival_airport) -->
  <path class="edge" d="M 720 198 L 760 198" marker-end="url(#arrow)"/>
  <text class="label" x="726" y="208">N:1</text>

  <!-- ticket_flights -> flights -->
  <path class="edge" d="M 900 500 L 900 472 L 560 472 L 560 382" marker-end="url(#arrow)"/>
  <text class="label" x="726" y="464">N:1</text>

  <!-- boarding_passes -> ticket_flights -->
  <path class="edge" d="M 720 576 L 760 576" marker-end="url(#arrow)"/>
  <text class="label" x="728" y="566">N:1</text>

  <!-- ticket_flights -> tickets -->
  <path class="edge" d="M 1060 550 L 1100 550" marker-end="url(#arrow)"/>
  <text class="label" x="1070" y="540">N:1</text>

  <!-- tickets -> bookings -->
  <path class="edge" d="M 1250 500 L 1250 228" marker-end="url(#arrow)"/>
  <text class="label" x="1258" y="408">N:1</text>
</svg>
