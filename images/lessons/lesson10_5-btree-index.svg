<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5efe6" />
      <stop offset="100%" stop-color="#e6ded0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#23313a" />
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <circle cx="1110" cy="90" r="78" fill="#c8b79e" opacity="0.34" />
  <circle cx="990" cy="550" r="126" fill="#c7d7ce" opacity="0.25" />
  <circle cx="120" cy="80" r="58" fill="#d8cbb6" opacity="0.2" />

  <rect x="0" y="0" width="450" height="630" fill="#23313a" />
  <text x="52" y="238" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">HOW B-TREE</text>
  <text x="52" y="294" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">INDEX</text>
  <text x="52" y="350" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">WORKS</text>
  <rect x="52" y="382" width="132" height="8" rx="4" fill="#df9b6b" />
  <text x="52" y="430" font-family="Arial, sans-serif" font-size="23" fill="#c9d4da">Root, Nodes, Leaves</text>

