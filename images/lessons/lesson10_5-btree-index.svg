  <rect x="500" y="332" width="630" height="244" rx="18" fill="#ffffff" filter="url(#shadow)" />
  <text x="532" y="375" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#23313a">Index-Friendly Access</text>
  <text x="532" y="414" font-family="Courier New, monospace" font-size="17" fill="#4f5f68">WHERE customer_id = 10</text>
  <text x="532" y="442" font-family="Courier New, monospace" font-size="17" fill="#4f5f68">AND payment_date &gt;= '2005-07-01'</text>
  <text x="532" y="470" font-family="Courier New, monospace" font-size="17" fill="#4f5f68">ORDER BY payment_date</text>
  <rect x="912" y="398" width="186" height="44" rx="10" fill="#dbe9e1" />
  <text x="1005" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#23313a">range + order</text>

  <text x="532" y="518" font-family="Courier New, monospace" font-size="17" fill="#8c3e3e">WHERE YEAR(payment_date) = 2005</text>
  <rect x="912" y="495" width="186" height="44" rx="10" fill="#f1d5c3" />
  <text x="1005" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#23313a">often no index</text>
