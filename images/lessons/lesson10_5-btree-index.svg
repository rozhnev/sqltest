  <path d="M814 152 L942 176" stroke="#23313a" stroke-width="2.2" marker-end="url(#arrow)" />
  <path d="M686 216 L616 242" stroke="#23313a" stroke-width="1.8" marker-end="url(#arrow)" />
  <path d="M686 216 L752 242" stroke="#23313a" stroke-width="1.8" marker-end="url(#arrow)" />
  <path d="M942 216 L888 242" stroke="#23313a" stroke-width="1.8" marker-end="url(#arrow)" />
