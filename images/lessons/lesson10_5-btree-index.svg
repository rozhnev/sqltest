  <text x="532" y="95" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#23313a">B-tree Traversal</text>

  <rect x="748" y="112" width="132" height="40" rx="10" fill="#dce9e2" />
  <text x="790" y="137" text-anchor="middle" font-family="Courier New, monospace" font-size="16" fill="#23313a">ROOT</text>

  <rect x="620" y="176" width="132" height="40" rx="10" fill="#eef3f0" />
  <rect x="876" y="176" width="132" height="40" rx="10" fill="#eef3f0" />
  <text x="686" y="201" text-anchor="middle" font-family="Courier New, monospace" font-size="15" fill="#23313a">NODE A</text>
  <text x="942" y="201" text-anchor="middle" font-family="Courier New, monospace" font-size="15" fill="#23313a">NODE B</text>

  <rect x="560" y="242" width="112" height="38" rx="9" fill="#f7f7f7" />
  <rect x="696" y="242" width="112" height="38" rx="9" fill="#f7f7f7" />
  <rect x="832" y="242" width="112" height="38" rx="9" fill="#f7f7f7" />
  <rect x="968" y="242" width="112" height="38" rx="9" fill="#f7f7f7" />
  <text x="616" y="266" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#23313a">LEAF</text>
  <text x="752" y="266" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#23313a">LEAF</text>
  <text x="888" y="266" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#23313a">LEAF</text>
  <text x="1024" y="266" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#23313a">LEAF</text>

