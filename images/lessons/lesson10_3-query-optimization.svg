<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with a soft gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <dropShadow id="shadow" dx="2" dy="4" stdDeviation="3" flood-opacity="0.1" />
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- Decorative circular shapes -->
  <circle cx="1000" cy="50" r="100" fill="#dee2e6" opacity="0.3" />
  <circle cx="50" cy="580" r="80" fill="#adb5bd" opacity="0.1" />

  <!-- Left Side Panel (Main Topic) -->
  <rect x="0" y="0" width="450" height="630" fill="#212529" />
  <text x="50" y="280" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">QUERY</text>
  <text x="50" y="340" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">OPTIMIZATION</text>
  <rect x="50" y="370" width="100" height="8" fill="#ffc107" />
  <text x="50" y="420" font-family="Arial, sans-serif" font-size="24" fill="#ced4da">EXPLAIN &amp; Execution Plans</text>

  <!-- Right Side (Light Cards/Diagrams) -->
  
  <!-- Card 1: EXPLAIN Output -->
  <rect x="500" y="80" width="620" height="200" rx="15" fill="#ffffff" filter="url(#shadow)" />
  <text x="530" y="125" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#212529">Reading EXPLAIN</text>
  
  <rect x="530" y="150" width="130" height="40" rx="5" fill="#e9ecef" />
  <text x="545" y="176" font-family="Courier New, monospace" font-size="16" fill="#212529">type: ALL</text>
  <text x="670" y="176" font-family="Arial, sans-serif" font-size="16" fill="#dc3545">❌ Full Table Scan</text>
  
  <rect x="530" y="210" width="130" height="40" rx="5" fill="#e9ecef" />
  <text x="545" y="236" font-family="Courier New, monospace" font-size="16" fill="#212529">type: ref</text>
  <text x="670" y="236" font-family="Arial, sans-serif" font-size="16" fill="#198754">✅ Using Index</text>

  <!-- Card 2: The Optimizer Flow -->
  <rect x="500" y="320" width="620" height="230" rx="15" fill="#ffffff" filter="url(#shadow)" />
  <text x="530" y="365" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#212529">Optimizer Flow</text>
  
  <circle cx="580" cy="450" r="40" fill="#212529" />
  <text x="555" y="455" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">QUERY</text>
  
  <path d="M620 450 L680 450" stroke="#212529" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="690" y="420" width="100" height="60" rx="5" fill="#0dcaf0" />
  <text x="702" y="455" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#212529">OPTIMIZER</text>
  
  <path d="M790 450 L850 450" stroke="#212529" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="860" y="420" width="100" height="60" rx="5" fill="#ffc107" />
  <text x="872" y="455" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#212529">BEST PLAN</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#212529" />
    </marker>
  </defs>
  
  <text x="530" y="525" font-family="Arial, sans-serif" font-size="16" fill="#6c757d">The DB engine finds the "cheapest" way to get data.</text>

</svg>
